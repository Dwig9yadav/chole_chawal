services:
  postgres:
    image: postgres:16-alpine
    container_name: voxai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voxai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voxai"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voxai-network

  redis:
    image: redis:7-alpine
    container_name: voxai-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - voxai-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voxai-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/voxai
      REDIS_URL: redis://redis:6379
      DEBUG: "False"
      LOG_LEVEL: INFO
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - voxai-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: voxai-frontend
    environment:
      VITE_API_URL: http://backend:8000/api/v1
      VITE_WS_URL: ws://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - voxai-network

volumes:
  postgres_data:
  redis_data:

networks:
  voxai-network:
    driver: bridge